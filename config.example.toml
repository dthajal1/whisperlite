# whisperlite config — copy to ~/.config/whisperlite/config.toml and edit.

[model]
# Hugging Face repo id of the mlx-whisper model to use.
name = "mlx-community/whisper-medium-mlx"
# Language code (e.g. "en") or "auto" for detection.
language = "en"

[hotkey]
# Double-tap a modifier key to start/stop recording — same pattern as
# JetBrains "Search Everywhere" (double-Shift). Feels like a hidden
# single-key shortcut once you get used to it and never collides with
# app-defined chords.
# Valid values for `record`: <alt>, <shift>, <ctrl>, <cmd>.
# `double_tap_window_ms` is how quickly the second tap must follow the
# first. Range: [150, 1000]. 400 is comfortable for most people; drop to
# ~250 if you get accidental triggers, raise to ~600 if you're missing
# taps. Using the modifier in a chord (e.g. Opt+C) does NOT count as a tap.
record = "<alt>"
double_tap_window_ms = 400

[audio]
# Hard cap so toggle-mode mistakes don't record forever. Range: [5, 600].
max_recording_seconds = 120
# One of: 8000, 16000, 22050, 44100, 48000. Whisper expects 16000.
sample_rate = 16000
# 1 = mono, 2 = stereo. Whisper uses mono.
channels = 1

[inject]
# Milliseconds to wait after Cmd+V before restoring the pasteboard. Range: [0, 2000].
paste_delay_ms = 150

[ui]
# Menubar icon paths (PNG, should be 22x22 or 44x44 template images — monochrome with transparent background).
# Leave commented out to use the bundled speech-bubble icons in whisperlite/assets/.
# Absolute paths or paths relative to your current working directory both work.
# idle_icon = "~/my-icons/idle.png"
# recording_icon = "~/my-icons/recording.png"
# error_icon = "~/my-icons/error.png"

[log]
# One of: DEBUG, INFO, WARNING, ERROR, CRITICAL (case-insensitive).
level = "INFO"
# Rotating log file; `~` is expanded.
path = "~/Library/Logs/whisperlite.log"

[sound]
# Short audio cues played when recording starts and stops. Each cue runs
# through macOS `afplay` in a background subprocess, so it never blocks
# the coordinator worker. Set `enabled = false` to silence them entirely.
#
# `start_path` and `stop_path` can be any .aiff / .wav / .mp3 file that
# `afplay` understands. Browse /System/Library/Sounds/ for the built-in
# macOS alerts — good picks include Tink, Pop, Funk, Glass, Hero, Morse,
# Ping, Purr, Sosumi, Submarine, Bottle, Frog, Blow, Basso.
enabled = true
start_path = "/System/Library/Sounds/Tink.aiff"
stop_path = "/System/Library/Sounds/Pop.aiff"
